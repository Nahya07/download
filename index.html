        async function fetchVideo() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const btn = document.getElementById('btnAction');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            const errorBox = document.getElementById('error');
            const errorText = document.getElementById('errorText');

            if (!videoUrl) return;

            // Reset UI
            errorBox.classList.add('hidden');
            result.classList.add('hidden');
            loader.classList.remove('hidden');
            btn.disabled = true;

            try {
                // Endpoint Ziyotech yang benar berdasarkan data media service

                        'x-rapidapi-host': RAPID_HOST
                    },
                    body: new URLSearchParams({ url: videoUrl })
                });

                const rawData = await response.json();

                if (response.status !== 200) {
                    throw new Error(`HTTP ${response.status}: ${rawData.detail || rawData.message || 'API Error'}`);
                }

                // Struktur umum Ziyotech: { status: true, data: { video_url: "..." } }
                if (rawData.status === true || rawData.success === true) {
                    const videoInfo = rawData.data;
                    
                    document.getElementById('vCover').src = videoInfo.cover || videoInfo.thumbnail || '';
                    document.getElementById('vTitle').innerText = videoInfo.title || "TikTok Video";
                    
                    const finalDownloadUrl = videoInfo.video_url || videoInfo.nowatermark || videoInfo.url;

                    if (!finalDownloadUrl) throw new Error("Link video tidak ditemukan dalam respon API.");

                    document.getElementById('dlBtn').onclick = () => {
                        window.open(finalDownloadUrl, '_blank');
                    };

                    result.classList.remove('hidden');
                } else {
                    throw new Error(rawData.message || "Gagal mendapatkan data video. Link mungkin salah.");
                }

                errorBox.classList.remove('hidden');
                errorText.innerHTML = `<strong>ERROR:</strong> ${err.message}<br><small>Pastikan Anda sudah 'Subscribe' API Ziyotech di RapidAPI.</small>`;
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
