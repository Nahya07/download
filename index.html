            <div id="loader" class="hidden mt-10 text-center">

    <script>
        const RAPID_KEY = "83d6e85235msh149468d45ef63bdp118d8djsnf928a331895f";
        const RAPID_HOST = "ziyotech-tik-tok-downloader.p.rapidapi.com";

        async function fetchVideo() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const btn = document.getElementById('btnAction');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            const error = document.getElementById('error');

            if (!videoUrl) return showMsg("Masukkan link TikTok dulu Bos!");

            error.classList.add('hidden');
            result.classList.add('hidden');
            loader.classList.remove('hidden');
            btn.disabled = true;

            try {
                // Sesuai dengan Curl: POST dengan form-urlencoded
                const response = await fetch(`https://${RAPID_HOST}/tiktok/media/service/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'x-rapidapi-key': RAPID_KEY,
                        'x-rapidapi-host': RAPID_HOST
                    },
                    body: new URLSearchParams({ url: videoUrl })
                });

                if (!response.ok) throw new Error("API Error: " + response.status);

                const data = await response.json();
                console.log("Ziyotech Response:", data);

                // API ini biasanya mengembalikan format: { status: true, data: { video_url: "...", cover: "..." } }
                // Kita sesuaikan dengan data aslinya
                if (data && data.status) {
                    const videoInfo = data.data;
                    
                    document.getElementById('vCover').src = videoInfo.cover || '';
                    document.getElementById('vTitle').innerText = videoInfo.title || "Video Berhasil Diambil";
                    
                    const videoFinalUrl = videoInfo.video_url || videoInfo.url || videoInfo.nowatermark;

                    document.getElementById('dlNow').onclick = () => {
                        forceDownload(videoFinalUrl, `TikTok_NoWM_${Date.now()}.mp4`);
                    };

                    result.classList.remove('hidden');
                } else {
                    showMsg(data.message || "Gagal mengambil data. Coba link lain.");
                }

            } catch (err) {
                showMsg("Kesalahan: " + err.message);
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        async function forceDownload(url, filename) {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            
            try {
                const res = await fetch(url);
                const blob = await res.blob();
                const bUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = bUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    window.URL.revokeObjectURL(bUrl);
                    document.body.removeChild(a);
                }, 100);
            } catch (e) {
                window.open(url, '_blank');
            } finally {
                loader.classList.add('hidden');
            }
        }

        function showMsg(m) {
            const error = document.getElementById('error');
            error.innerText = m;
            error.classList.remove('hidden');
        }
    </script>
