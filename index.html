```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Ultra HD Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 0% 0%, #1a1a2e 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #2d1b2d 0%, transparent 50%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .shimmer {
            background: linear-gradient(90deg, #ff0050, #00f2fe, #ff0050);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col items-center justify-center p-6">

    <div class="max-w-xl w-full">
        <!-- Judul -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold tracking-tighter mb-3">
                TT <span class="text-transparent bg-clip-text shimmer">ULTRA</span>
            </h1>
            <p class="text-gray-400 text-sm tracking-widest uppercase font-bold">High Performance Downloader</p>
        </div>

        <!-- Box Utama -->
        <div class="glass rounded-[2rem] p-8 shadow-2xl">
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 ml-1">Link TikTok</label>
                    <input type="text" id="videoUrl" 
                        placeholder="Tempel link video di sini..." 
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-pink-500/50 outline-none transition-all text-white placeholder-gray-600 shadow-inner">
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <button onclick="fetchVideo()" id="btnAction" 
                        class="w-full bg-white text-black hover:bg-gray-200 py-4 rounded-2xl font-extrabold text-lg transition-all transform active:scale-95 flex items-center justify-center gap-2">
                        <span id="btnText">PROSES VIDEO</span>
                        <svg id="arrowIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loader" class="hidden mt-10 text-center">
                <div class="inline-block w-12 h-12 border-[3px] border-pink-500/20 border-t-pink-500 rounded-full animate-spin mb-4"></div>
                <p id="loaderText" class="text-xs text-gray-400 animate-pulse tracking-widest uppercase">Sedang memproses...</p>
            </div>

            <!-- Hasil Download -->
            <div id="result" class="hidden mt-10 space-y-4">
                <div class="flex items-center gap-5 p-4 bg-white/5 rounded-3xl border border-white/10">
                    <img id="vCover" src="" class="w-20 h-28 object-cover rounded-xl shadow-lg">
                    <div class="flex-1 overflow-hidden text-left">
                        <h3 id="vTitle" class="font-bold text-lg truncate">Judul Video</h3>
                        <p id="vAuthor" class="text-sm text-pink-500 mb-3 font-semibold">@user</p>
                        <div class="flex flex-wrap gap-2">
                            <span class="text-[10px] bg-white/10 px-2 py-1 rounded-md text-gray-400 font-bold uppercase">MP4</span>
                            <span class="text-[10px] bg-green-500/20 px-2 py-1 rounded-md text-green-400 font-bold uppercase tracking-widest">NO WATERMARK</span>
                        </div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 gap-3 pt-2">
                    <button id="btnHD" class="flex justify-between items-center bg-gradient-to-r from-pink-600 to-rose-600 p-4 rounded-2xl font-bold hover:opacity-90 transition-all text-white">
                        <span>DOWNLOAD HD (Normal)</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4-4v12"/></svg>
                    </button>
                    <button id="btnUHD" class="flex justify-between items-center bg-cyan-600 p-4 rounded-2xl font-bold hover:opacity-90 transition-all text-white">
                        <span>DOWNLOAD ULTRA HD (Original)</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </button>
                </div>
            </div>

            <!-- Error -->
            <div id="error" class="hidden mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-500 text-xs text-center font-bold tracking-tight">
                Gagal memproses link tersebut.
            </div>
        </div>
        
        <p class="mt-8 text-center text-[10px] text-gray-600 uppercase tracking-[0.4em] font-bold">Powered by TikWM Engine • V3.5</p>
    </div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            const btn = document.getElementById('btnAction');
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            const result = document.getElementById('result');
            const error = document.getElementById('error');

            if (!url) {
                showMsg("Bos, masukkan linknya dulu ya!");
                return;
            }

            // UI Reset
            error.classList.add('hidden');
            result.classList.add('hidden');
            loader.classList.remove('hidden');
            loaderText.innerText = "Mencari video...";
            btn.disabled = true;

            try {
                // Menggunakan API TikWM
                const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}&hd=1`;
                const response = await fetch(apiUrl);
                const json = await response.json();

                if (json.code === 0 && json.data) {
                    const data = json.data;
                    
                    document.getElementById('vCover').src = data.cover;
                    document.getElementById('vTitle').innerText = data.title || "TikTok Video";
                    document.getElementById('vAuthor').innerText = "@" + (data.author.nickname || "user");
                    
                    // Setup Download Buttons
                    const hdUrl = "https://www.tikwm.com" + data.play;
                    const uhdUrl = "https://www.tikwm.com" + (data.hdplay || data.play);
                    const filename = `tiktok_video_${data.id}.mp4`;

                    document.getElementById('btnHD').onclick = () => downloadFile(hdUrl, filename);
                    document.getElementById('btnUHD').onclick = () => downloadFile(uhdUrl, `ultra_hd_${filename}`);
                    
                    result.classList.remove('hidden');
                } else {
                    showMsg("Gagal: " + (json.msg || "Link tidak valid atau video private."));
                }
            } catch (e) {
                showMsg("Gagal terhubung ke server. Coba lagi.");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        // Fungsi ajaib untuk memaksa download file MP4
        async function downloadFile(url, name) {
            const btn = document.getElementById('btnAction');
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            
            loader.classList.remove('hidden');
            loaderText.innerText = "Mendownload file...";
            
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
            } catch (e) {
                // Fallback jika fetch blob gagal karena CORS
                window.open(url, '_blank');
            } finally {
                loader.classList.add('hidden');
            }
        }

        function showMsg(m) {
            const error = document.getElementById('error');
            error.innerText = m;
            error.classList.remove('hidden');
        }
    </script>
</body>
</html>
