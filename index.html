<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Ultra HD Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0b0f;
            background-image: radial-gradient(circle at top right, #1e1b4b, #0b0b0f);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-loader {
            border-right-color: transparent;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col items-center justify-center p-4">

    <div class="max-w-xl w-full">
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-2 tracking-tight">
                TT <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-cyan-400">UltraHD</span>
            </h1>
            <p class="text-gray-400 font-medium">Download video TikTok kualitas terbaik tanpa watermark.</p>
        </div>

        <div class="glass-card rounded-3xl p-6 md:p-8 shadow-2xl">
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Tempel Link Video</label>
                    <input type="text" id="videoUrl" 
                        placeholder="https://vt.tiktok.com/..." 
                        class="w-full bg-black/40 border border-gray-700 rounded-xl px-4 py-4 focus:ring-2 focus:ring-pink-500 focus:border-transparent outline-none transition-all text-white placeholder-gray-600">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Kualitas Target</label>
                    <div class="relative">
                        <select id="quality" class="w-full bg-black/40 border border-gray-700 rounded-xl px-4 py-4 focus:ring-2 focus:ring-cyan-500 outline-none appearance-none cursor-pointer">
                            <option value="highres">Ultra HD (Paling Tinggi)</option>
                            <option value="1080p">Full HD (1080p)</option>
                            <option value="720p" selected>HD (720p)</option>
                        </select>
                        <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>

                <button onclick="handleDownload()" id="btnAction" 
                    class="w-full bg-gradient-to-r from-pink-600 to-indigo-600 hover:from-pink-500 hover:to-indigo-500 py-4 rounded-xl font-bold text-lg transition-all transform active:scale-95 shadow-lg shadow-pink-900/20 flex items-center justify-center">
                    <span id="btnText">Ambil Video</span>
                </button>
            </div>

            <!-- Loader Section -->
            <div id="loader" class="hidden mt-8 text-center">
                <div class="inline-block h-10 w-10 border-4 border-pink-500 custom-loader rounded-full mb-3"></div>
                <p class="text-sm text-gray-400">Sedang mengekstrak video, mohon tunggu Bos...</p>
            </div>

            <!-- Result Section -->
            <div id="result" class="hidden mt-8 border-t border-gray-800 pt-6">
                <div class="bg-white/5 rounded-2xl p-4 flex flex-col md:flex-row items-center gap-6">
                    <div class="relative group">
                        <img id="thumb" src="" class="w-28 h-40 object-cover rounded-xl shadow-xl border border-white/10 bg-gray-900">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent rounded-xl"></div>
                    </div>
                    <div class="flex-1 text-center md:text-left">
                        <h3 id="author" class="font-bold text-xl text-white mb-1 truncate max-w-[200px]">Video Ditemukan</h3>
                        <p id="videoInfo" class="text-xs text-cyan-400 font-mono mb-4 uppercase tracking-tighter italic font-bold">KUALITAS TERBAIK</p>
                        <a id="finalDownload" href="#" target="_blank" 
                            class="inline-flex items-center justify-center bg-white text-black px-8 py-3 rounded-xl font-extrabold hover:bg-cyan-400 hover:text-black transition-all duration-300 w-full md:w-auto shadow-xl">
                            DOWNLOAD MP4
                        </a>
                    </div>
                </div>
            </div>

            <!-- Error Display -->
            <div id="error" class="hidden mt-6 p-4 bg-red-900/20 border border-red-500/30 rounded-2xl text-red-400 text-sm flex items-center gap-3">
                <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                <span id="errorText">Terjadi kesalahan.</span>
            </div>
        </div>

        <p class="mt-8 text-center text-[10px] text-gray-600 uppercase tracking-[0.2em]">ULTRA HD ENGINE V3.0</p>
    </div>

    <script>
        // API Key milik Bos
        const RAPID_API_KEY = "83d6e85235msh149468d45ef63bdp118d8djsnf928a331895f"; 
        const RAPID_API_HOST = "social-media-video-downloader.p.rapidapi.com";

        async function handleDownload() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const targetQuality = document.getElementById('quality').value;
            const btn = document.getElementById('btnAction');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            const error = document.getElementById('error');

            if (!urlInput) return showError("Bos, masukkan link TikTok-nya dulu!");
            
            error.classList.add('hidden');
            result.classList.add('hidden');
            loader.classList.remove('hidden');
            btn.disabled = true;
            btnText.innerText = "Sabar Bos...";

            try {
                // Endpoint /smvd/get/all biasanya yang paling stabil di API ini
                const apiUrl = `https://${RAPID_API_HOST}/smvd/get/all?url=${encodeURIComponent(urlInput)}`;
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 
                        'x-rapidapi-key': RAPID_API_KEY, 
                        'x-rapidapi-host': RAPID_API_HOST 
                    }
                });

                // Cek jika API Key salah atau kuota habis (Error 401/403/429)
                if (response.status === 401 || response.status === 403) {
                    throw new Error("API Key Bos tidak valid atau belum di-subscribe di RapidAPI.");
                }
                if (response.status === 429) {
                    throw new Error("Kuota API Bos sudah habis untuk bulan ini.");
                }

                const resData = await response.json();
                console.log("Raw API Response:", resData);

                // Normalisasi pengecekan data
                let downloadUrl = "";
                let displayQuality = "HD";
                let thumbnail = "";
                let title = "Video TikTok";

                // Jika API mengembalikan array 'links' (format umum API ini)
                if (resData && resData.links && Array.isArray(resData.links) && resData.links.length > 0) {
                    // Cari link yang bukan watermark (biasanya kualitas ditandai 'highres' atau 'no_watermark')
                    const found = resData.links.find(l => l.quality === targetQuality) || 
                                  resData.links.find(l => l.quality.toLowerCase().includes('high')) || 
                                  resData.links[0];
                    
                    downloadUrl = found.link;
                    displayQuality = found.quality || "Original";
                    thumbnail = resData.picture || resData.cover || '';
                    title = resData.title || title;
                } 
                // Jika API langsung memberikan object tunggal (format cadangan)
                else if (resData && resData.url) {
                    downloadUrl = resData.url;
                    thumbnail = resData.picture || '';
                }

                if (!downloadUrl) {
                    throw new Error("Video ini diproteksi atau server sedang sibuk. Coba link lain.");
                }

                // Update UI dengan data yang didapat
                document.getElementById('thumb').src = thumbnail || 'https://via.placeholder.com/300x500?text=No+Preview';
                document.getElementById('author').innerText = title.length > 30 ? title.substring(0, 30) + "..." : title;
                document.getElementById('videoInfo').innerText = displayQuality.toUpperCase() + " NO WATERMARK";
                
                const dlBtn = document.getElementById('finalDownload');
                dlBtn.href = downloadUrl;
                
                result.classList.remove('hidden');

            } catch (err) {
                console.error("Download Error:", err);
                showError(err.message);
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
                btnText.innerText = "Ambil Video";
            }
        }

        function showError(msg) {
            const error = document.getElementById('error');
            const errorText = document.getElementById('errorText');
            errorText.innerText = msg;
            error.classList.remove('hidden');
            document.getElementById('loader').classList.add('hidden');
        }
    </script>
</body>
</html>
