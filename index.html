<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;

            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-gradient {

<body class="min-h-screen text-white flex flex-col items-center justify-center p-6">

    <div class="max-w-xl w-full">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold tracking-tighter mb-3 uppercase italic">

            <p class="text-gray-400 text-xs tracking-[0.3em] font-bold">PREMIUM VIDEO ENGINE</p>

        <div class="glass rounded-[2.5rem] p-8 shadow-2xl">
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 ml-1 text-left">Link Video TikTok</label>
                    <input type="text" id="videoUrl" 
                        placeholder="Tempel link di sini..." 
                        class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-cyan-500 outline-none transition-all text-white placeholder-gray-600">

                <button onclick="fetchVideo()" id="btnAction" 
                    class="w-full btn-gradient py-4 rounded-2xl font-black text-lg text-black flex items-center justify-center gap-3">
                    <span id="btnText">DOWNLOAD VIDEO</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>

            <!-- Loader -->
            <div id="loader" class="hidden mt-10 text-center">
                <div class="inline-block w-10 h-10 border-4 border-cyan-500/20 border-t-cyan-400 rounded-full animate-spin mb-3"></div>

    <script>
        // Gunakan kredensial yang Bos berikan
        const RAPID_KEY = "83d6e85235msh149468d45ef63bdp118d8djsnf928a331895f";
        const RAPID_HOST = "ziyotech-tik-tok-downloader.p.rapidapi.com";

        async function fetchVideo() {
            const inputVal = document.getElementById('videoUrl').value.trim();
            const btn = document.getElementById('btnAction');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            const errorBox = document.getElementById('error');

            if (!inputVal) return showMsg("Bos, linknya masih kosong!");

            errorBox.classList.add('hidden');
            result.classList.add('hidden');
            loader.classList.remove('hidden');
            btn.disabled = true;

            try {
                // Perbaikan endpoint: Tanpa trailing slash untuk menghindari 404
                const endpoint = `https://${RAPID_HOST}/tiktok/media/service`;
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'x-rapidapi-key': RAPID_KEY,
                        'x-rapidapi-host': RAPID_HOST
                    },
                    body: new URLSearchParams({ url: inputVal })
                });

                if (response.status === 404) {
                    throw new Error("Endpoint tidak ditemukan (404). Silakan periksa apakah API ini masih aktif di dashboard RapidAPI Bos.");
                }

                const res = await response.json();
                console.log("API Response:", res);

                // Menangani berbagai kemungkinan struktur response dari API Ziyotech
                if (res.status === true || res.success === true || (res.data && res.data.video_url)) {
                    const videoData = res.data;
                    
                    document.getElementById('vCover').src = videoData.cover || videoData.thumbnail || '';
                    document.getElementById('vTitle').innerText = videoData.title || "TikTok Video";
                    
                    // Prioritaskan video tanpa watermark
                    const finalUrl = videoData.video_url || videoData.nowatermark || videoData.url;

                    if (!finalUrl) throw new Error("Link video tidak ditemukan dalam respon API.");

                    document.getElementById('dlNow').onclick = () => {
                        window.open(finalUrl, '_blank');
                    };

                    result.classList.remove('hidden');
                } else {
                    showMsg(res.message || "Gagal memproses video. Pastikan link benar.");
                }

            } catch (err) {
                showMsg("Kesalahan: " + err.message);
                console.error(err);
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function showMsg(m) {
            const error = document.getElementById('error');
            error.innerText = m;
            error.classList.remove('hidden');
        }
    </script>
